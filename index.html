<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Headroom</title>

    <!-- Old-money theme fonts (Cormorant Garamond headings, IBM Plex Mono
         figures, Inter body) are self-hosted via Fontsource — imported in
         src/fonts.ts so they precache for offline and need no Google allowlist. -->

    <!-- Installable / standalone app — keeps in-app navigation inside the app shell (no Safari chrome on iOS) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0E100D" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Headroom" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
